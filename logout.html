<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الخروج | ماستر نت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="greeting-box">
                <h2 id="main-greeting">إلى اللقاء 👋</h2>
                <p>نراك قريباً</p>
            </div>
            <div class="time-now"><span id="clock">00:00</span> <small id="ampm"></small></div>
        </header>

        <main class="login-card logout-final">
            <div class="success-icon">✔️</div>
            <h2>تم تسجيل الخروج بنجاح</h2>
            <p style="color: #64748B; margin-bottom: 20px;">شكراً لاستخدامك شبكة ماستر نت</p>

            <div class="final-report">
                <div class="report-item">
                    <span>إجمالي الاستهلاك:</span>
                    <strong>$(bytes-out-nice)</strong>
                </div>
                <div class="report-item">
                    <span>مدة الجلسة:</span>
                    <strong>$(uptime)</strong>
                </div>
                <div class="report-item">
                    <span>اسم المستخدم:</span>
                    <strong>$(username)</strong>
                </div>
            </div>

            <a href="login.html" class="main-btn"
                style="text-align: center; display: block; text-decoration: none;">تسجيل دخول مرة أخرى</a>
        </main>

        <nav class="nav-bar">
            <a href="login.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>الرئيسية</span>
            </a>
            <a href="packages.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"></path><path d="M11 3 8 9l4 13 4-13-3-6"></path><path d="M2 9h20"></path></svg>
                <span>الباقات</span>
            </a>
            <a href="sellers.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span>الموزعون</span>
            </a>
            <a href="support.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                <span>الدعم</span>
            </a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>

</html>
