<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالة الاتصال | ماستر نت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="greeting-box">
                <h2 id="main-greeting" style="display: flex; align-items: center; gap: 8px;">
                    متصل الآن 
                    <span style="display: inline-block; width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: pulseDot 1.2s infinite alternate;"></span>
                </h2>
                <style>
                    @keyframes pulseDot {
                        0% { opacity: 0.4; transform: scale(0.9); }
                        100% { opacity: 1; transform: scale(1.1); }
                    }
                </style>
                <p>نتمنى لك إبحاراً ممتعاً</p>
            </div>
            <div class="time-now"><span id="clock">00:00</span> <small id="ampm"></small></div>
        </header>

        <main class="login-card status-card">
            <div class="user-avatar" style="color: var(--blue); margin-bottom: 15px;">
                <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h3 class="user-id">$(username)</h3>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">تم استهلاك</span>
                    <span class="stat-value">$(bytes-out-nice)</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">وقت الاتصال</span>
                    <span class="stat-value">$(uptime)</span>
                </div>
            </div>

            <div class="session-info">
                $(if session-time-left)
                <div class="info-row">
                    <span>الوقت المتبقي:</span>
                    <strong>$(session-time-left)</strong>
                </div>
                $(endif)
                <div class="info-row">
                    <span>عنوان الجهاز:</span>
                    <strong>$(ip)</strong>
                </div>
                <div class="info-row">
                    <span>الماك أدرس:</span>
                    <strong>$(mac)</strong>
                </div>
            </div>

            <form action="$(link-logout)" name="logout" onsubmit="return openLogout()">
                <button type="submit" class="logout-btn">قطع الاتصال</button>
            </form>
        </main>

        <nav class="nav-bar">
            <a href="status.html" class="nav-btn active">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                <span>الحالة</span>
            </a>
            <a href="packages.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"></path><path d="M11 3 8 9l4 13 4-13-3-6"></path><path d="M2 9h20"></path></svg>
                <span>الباقات</span>
            </a>
            <a href="sellers.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span>الموزعون</span>
            </a>
            <a href="support.html" class="nav-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                <span>الدعم</span>
            </a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>

</html>
