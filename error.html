<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تنبيه الخطأ | ماستر نت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container" style="margin-top: 60px;">
        <main class="login-card" style="text-align: center;">
            <div class="logo-area">
                <svg viewBox="0 0 500 500" class="brand-logo" width="100%" height="auto" style="max-height: 180px;">
                    <!-- Gradients -->
                    <defs>
                        <linearGradient id="blueDark" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#002b7f" />
                            <stop offset="100%" stop-color="#001845" />
                        </linearGradient>
                        <linearGradient id="blueLight" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#0088ff" />
                            <stop offset="100%" stop-color="#00bfff" />
                        </linearGradient>
                        <linearGradient id="swooshGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#001845" />
                            <stop offset="50%" stop-color="#0055ff" />
                            <stop offset="100%" stop-color="#00bfff" />
                        </linearGradient>
                        
                        <!-- Drop Shadow for 3D effect -->
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
                        </filter>
                    </defs>

                    <path d="M 85 280 Q 250 360 450 190 " fill="none" stroke="url(#swooshGrad)" stroke-width="22" stroke-linecap="round"/>
                    <path d="M 90 285 Q 250 390 420 180" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"/>

                    <g transform="translate(10, -10)">
                        <!-- Clean perfect M shape -->
                        <path d="M 250 260 L 310 120 L 380 280" fill="none" stroke="url(#blueLight)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round" />
                        <path d="M 120 280 L 190 120 L 250 260" fill="none" stroke="url(#blueDark)" stroke-width="50" stroke-linejoin="round" stroke-linecap="round" filter="url(#shadow)"/>
                    </g>
                    
                    <!-- Better Swoosh intersecting M -->
                    <path d="M 85 280 Q 250 360 450 190" fill="none" stroke="url(#swooshGrad)" stroke-width="16" stroke-linecap="round"/>

                    <!-- Wi-Fi Icon (Top Right) -->
                    <g transform="translate(350, 90)">
                        <circle cx="0" cy="40" r="10" fill="#003399" />
                        <path d="M -15 20 Q 0 5 15 20" fill="none" stroke="#0088ff" stroke-width="6" stroke-linecap="round" />
                        <path d="M -30 5 Q 0 -20 30 5" fill="none" stroke="#0088ff" stroke-width="7" stroke-linecap="round" />
                        <path d="M -45 -10 Q 0 -45 45 -10" fill="none" stroke="#003399" stroke-width="8" stroke-linecap="round" />
                    </g>

                    <!-- Arabic Text: ماستر نت -->
                    <g transform="translate(250, 380)">
                        <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="65" font-weight="900" text-anchor="middle" direction="rtl">
                            <tspan fill="url(#blueDark)">ماستر </tspan>
                            <tspan fill="url(#blueLight)">نت</tspan>
                        </text>
                    </g>

                    <!-- English Text: MASTER NET -->
                    <g transform="translate(250, 420)">
                        <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#001845" letter-spacing="10" text-anchor="middle">MASTER NET</text>
                        <line x1="-150" y1="-6" x2="-100" y2="-6" stroke="#0088ff" stroke-width="2" stroke-linecap="round" />
                        <line x1="110" y1="-6" x2="160" y2="-6" stroke="#0088ff" stroke-width="2" stroke-linecap="round" />
                    </g>
                </svg>
            </div>

            <!-- علامة التنبيه الدائرية المتجهة -->
            <div class="success-icon" style="background: #fff5f5; color: #ef4444; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; width: 74px; height: 74px; border-radius: 50%;">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </div>
            
            <h2 style="color: var(--blue); font-weight: 900; margin-bottom: 8px; font-size: 1.4rem;">فشل في تسجيل الدخول</h2>
            <p style="color: var(--gray); font-size: 0.85rem; margin-bottom: 25px; font-weight: 700;">يرجى مراجعة تفاصيل التنبيه أدناه والمحاولة مجدداً:</p>

            <!-- صندوق تفاصيل الخطأ الزجاجي -->
            <div class="error-container" style="margin-top: 0; margin-bottom: 30px; border-right: 4px solid #ef4444; justify-content: center;">
                <span class="error-text" id="ar-error">⚠️ $(error)</span>
            </div>
            
            <script>
                var err = "$(error)".toLowerCase();
                var msg = "حدث خطأ غير معروف في الشبكة.";

                if (err.indexOf("invalid") !== -1 || err.indexOf("not found") !== -1) {
                    msg = "رقم الكارت أو كلمة المرور غير صحيحة، يرجى إعادة التحقق.";
                } else if (err.indexOf("uptime limit") !== -1) {
                    msg = "انتهى الوقت المسموح به لهذه البطاقة (انتهت صلاحية الكارت).";
                } else if (err.indexOf("byte limit") !== -1 || err.indexOf("download limit") !== -1 || err.indexOf("traffic limit") !== -1 || err.indexOf("credit") !== -1) {
                    msg = "انتهى رصيد الكارت (لقد استهلكت كامل باقة التحميل).";
                } else if (err.indexOf("simultaneous") !== -1 || err.indexOf("already active") !== -1) {
                    msg = "هذا الكارت مستخدم حالياً في جهاز آخر! يرجى فصله أولاً.";
                } else if (err.indexOf("mac address") !== -1 || (err.indexOf("mac") !== -1 && err.indexOf("binding") !== -1)) {
                    msg = "الدخول مقيد، هذا الكارت مخصص لجهاز آخر فقط.";
                } else if (err.indexOf("not active") !== -1) {
                    msg = "البطاقة غير فعالة في الوقت الحالي.";
                } else if (err.indexOf("radius") !== -1 || err.indexOf("timeout") !== -1 || err.indexOf("responding") !== -1) {
                    msg = "نظام السيرفر يعاني من ضغط مؤقت، جرب المحاولة بعد ثوانٍ.";
                } else if (err.trim() !== "" && err !== "$(" + "error)") {
                    msg = "$(error)";
                }

                document.getElementById("ar-error").innerHTML = "⚠️ " + msg;
            </script>

            <!-- زر العودة -->
            <form action="$(link-login)" name="login">
                <button type="submit" class="main-btn">العودة لصفحة الدخول</button>
            </form>
        </main>
    </div>
</body>

</html>
